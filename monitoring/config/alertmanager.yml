global:
  resolve_timeout: 5m

# ── Inhibition: suppress warning when critical is already firing ──
inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ['alertname', 'service']

route:
  receiver: default
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts get shorter repeat interval
    - matchers:
        - severity = critical
      receiver: critical
      group_wait: 10s
      repeat_interval: 1h
    # Warning alerts
    - matchers:
        - severity = warning
      receiver: default
      repeat_interval: 4h

receivers:
  - name: default
    # Webhook / email / Slack receiver can be added here
    # Example for Slack:
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/XXX/YYY/ZZZ'
    #     channel: '#taskflow-alerts'
    #     title: '{{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'

  - name: critical
    # Duplicate to critical channel / PagerDuty when configured
    # pagerduty_configs:
    #   - service_key: '<PD_SERVICE_KEY>'
